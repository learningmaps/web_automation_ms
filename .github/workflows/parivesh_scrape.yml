name: Parivesh Scraper Pipeline

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of PDFs to process'
        required: false
        default: '50'

  # Run once a week automatically (Mondays at 03:00 UTC)
  schedule:
    - cron: '0 3 * * 1'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_INDIA: ${{ secrets.DATABASE_URL_INDIA }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_D: ${{ secrets.GEMINI_API_KEY_D }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PYTHONPATH: .
        run: |
          python projects/parivesh_auto/run_scraper.py --limit ${{ github.event.inputs.limit || '50' }}
