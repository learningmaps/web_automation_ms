name: Supabase Keep-Alive

on:
  schedule:
    # Every 5 days at midnight UTC
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  ping-databases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Ping Both Supabase Databases
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_INDIA: ${{ secrets.DATABASE_URL_INDIA }}
        run: |
          python -c "
          import os, psycopg2
          for key in ['DATABASE_URL', 'DATABASE_URL_INDIA']:
              try:
                  conn = psycopg2.connect(os.environ[key])
                  conn.cursor().execute('SELECT 1')
                  conn.close()
                  print(f'{key}: OK')
              except Exception as e:
                  print(f'{key}: FAILED - {e}')
                  raise
          "
